# ===============================
# BASIC SNORT CONFIG (TEST MODE)
# ===============================

# Define network
ipvar HOME_NET any
ipvar EXTERNAL_NET any

# Logging
#output alert_fast: /var/log/snort/alert
output alert_fast: alert

# ===============================
# SIMPLE RULES
# ===============================

# Detect ping (ICMP)
alert icmp any any -> any any (msg:"ICMP DETECTED"; sid:1000001; rev:1;)

# Detect TCP connection (basic)
alert tcp any any -> any any (msg:"TCP CONNECTION DETECTED"; sid:1000002; rev:1;)

# Detect UDP traffic
alert udp any any -> any any (msg:"UDP TRAFFIC DETECTED"; sid:1000003; rev:1;)